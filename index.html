<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>timer_youness_gn</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>timer_youness_gn</h1>
        <p id="modeLabel" class="mode-label"></p>
      </header>

      <section id="adminView" class="view hidden" aria-live="polite">
        <div class="card">
          <h2>Admin Dashboard</h2>
          <p class="muted">
            Use this mode on mobile phone or laptop: ?mode=admin
          </p>

          <label for="meetingTitleInput">Meeting Title</label>
          <input
            id="meetingTitleInput"
            type="text"
            value="Monthly Review"
            maxlength="100"
          />

          <div class="schedule-grid">
            <div>
              <label for="startTimeInput">Start Time</label>
              <input id="startTimeInput" type="time" value="09:00" />
            </div>
            <div>
              <label for="endTimeInput">End Time</label>
              <input id="endTimeInput" type="time" value="10:00" />
            </div>
          </div>

          <label for="warningThresholdInput"
            >Warning Threshold (minutes before end)</label
          >
          <input
            id="warningThresholdInput"
            type="number"
            min="1"
            max="120"
            value="5"
          />

          <div class="button-grid">
            <button id="startBtn" class="btn btn-start" type="button">
              Start
            </button>
            <button id="pauseBtn" class="btn btn-pause" type="button">
              Pause
            </button>
            <button id="resetBtn" class="btn btn-reset" type="button">
              Reset
            </button>
          </div>

          <p id="adminLiveTime" class="admin-live">00:00</p>
          <p id="adminStatus" class="status">Loading state...</p>
          <p class="muted small">
            Remote keys: ArrowUp/ArrowDown adjust warning threshold, Enter
            toggles Start/Pause
          </p>
        </div>
      </section>

      <section id="tvView" class="view hidden" aria-live="polite">
        <div class="tv-frame">
          <p id="tvMeetingTitle" class="tv-title">Monthly Review</p>
          <p id="tvScheduleMeta" class="tv-meta">Start 09:00 • End 10:00</p>
          <p id="tvStatus" class="tv-status">Waiting</p>
          <p id="tvTimer" class="tv-timer">00:00</p>
          <div
            class="tv-progress-wrap"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <div id="tvProgress" class="tv-progress"></div>
          </div>
          <p id="tvHint" class="tv-hint">Open this URL on TV with ?mode=tv</p>
        </div>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
